apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: app-prod
resources:
  - ../../base
  - namespace.yaml
  - resourcequota.yaml
  - limitrange.yaml
  - networkpolicy-default-deny.yaml
  - networkpolicy-allow-ingress.yaml
  - networkpolicy-allow-dns.yaml
patches:
  - path: patch-configmap.yaml
  - path: patch-deployment.yaml
